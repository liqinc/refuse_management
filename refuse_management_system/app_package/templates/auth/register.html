{% extends "base.html" %}

{% block title %}用户注册 - 垃圾分类管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h4><i class="fa fa-user-plus mr-2"></i>用户注册</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-user"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
                        </div>
                        <div class="form-text text-muted mt-1">用户名长度为4-20个字符</div>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label">邮箱</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="请输入邮箱">
                        </div>
                        <div class="form-text text-muted mt-1">请输入有效的邮箱地址</div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
                        </div>
                        <div class="form-text text-muted mt-1">密码长度至少8个字符，包含字母和数字</div>
                    </div>
                    <div class="mb-4">
                        <label for="confirm_password" class="form-label">确认密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-lock"></i></span>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="请再次输入密码">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fa fa-user-plus mr-2"></i>注册
                    </button>
                    <div class="text-center">
                        <p class="text-muted">已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
