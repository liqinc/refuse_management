{% extends "base.html" %}

{% block title %}添加垃圾资讯 - 垃圾分类管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="fa fa-plus-circle mr-2"></i>添加垃圾资讯</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('refuse_news.add_news') }}">
                        <div class="mb-4">
                            <label for="title" class="form-label">资讯标题 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-heading"></i></span>
                                <input type="text" class="form-control" id="title" name="title" required placeholder="请输入资讯标题">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="subtitle" class="form-label">副标题</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-text-height"></i></span>
                                <input type="text" class="form-control" id="subtitle" name="subtitle" placeholder="请输入副标题（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="publish_date" class="form-label">发布日期 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-calendar"></i></span>
                                <input type="date" class="form-control" id="publish_date" name="publish_date" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="author" class="form-label">作者</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-user"></i></span>
                                <input type="text" class="form-control" id="author" name="author" placeholder="请输入作者（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="source" class="form-label">资讯来源</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-link"></i></span>
                                <input type="text" class="form-control" id="source" name="source" placeholder="请输入资讯来源（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="category" class="form-label">分类</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-recycle"></i></span>
                                <select class="form-control" id="category" name="category">
                                    <option value="">请选择分类（可选）</option>
                                    <option value="政策法规">政策法规</option>
                                    <option value="科普知识">科普知识</option>
                                    <option value="行业动态">行业动态</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="cover_image" class="form-label">封面图片URL</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-image"></i></span>
                                <input type="text" class="form-control" id="cover_image" name="cover_image" placeholder="请输入封面图片URL（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="content" class="form-label">资讯内容 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-file-text-o"></i></span>
                                <textarea class="form-control" id="content" name="content" rows="8" required placeholder="请输入资讯内容"></textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('refuse_news.list_news') }}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left mr-2"></i>返回
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-save mr-2"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
