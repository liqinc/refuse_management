{% extends "base.html" %}

{% block title %}编辑垃圾资讯 - 垃圾分类管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="fa fa-pencil mr-2"></i>编辑垃圾资讯</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('refuse_news.edit_news', news_id=news.id) }}">
                        <div class="mb-4">
                            <label for="title" class="form-label">资讯标题 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-heading"></i></span>
                                <input type="text" class="form-control" id="title" name="title" value="{{ news.title }}" required placeholder="请输入资讯标题">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="subtitle" class="form-label">副标题</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-text-height"></i></span>
                                <input type="text" class="form-control" id="subtitle" name="subtitle" value="{{ news.subtitle or '' }}" placeholder="请输入副标题（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="publish_date" class="form-label">发布日期 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-calendar"></i></span>
                                <input type="date" class="form-control" id="publish_date" name="publish_date" value="{{ news.publish_date.strftime('%Y-%m-%d') }}" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="author" class="form-label">作者</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-user"></i></span>
                                <input type="text" class="form-control" id="author" name="author" value="{{ news.author or '' }}" placeholder="请输入作者（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="source" class="form-label">资讯来源</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-link"></i></span>
                                <input type="text" class="form-control" id="source" name="source" value="{{ news.source or '' }}" placeholder="请输入资讯来源（可选）">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="category" class="form-label">分类</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-recycle"></i></span>
                                <select class="form-control" id="category" name="category">
                                    <option value="" {% if not news.category %}selected{% endif %}>请选择分类（可选）</option>
                                    <option value="政策法规" {% if news.category == '政策法规' %}selected{% endif %}>政策法规</option>
                                    <option value="科普知识" {% if news.category == '科普知识' %}selected{% endif %}>科普知识</option>
                                    <option value="行业动态" {% if news.category == '行业动态' %}selected{% endif %}>行业动态</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="cover_image" class="form-label">封面图片URL</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-image"></i></span>
                                <input type="text" class="form-control" id="cover_image" name="cover_image" value="{{ news.cover_image or '' }}" placeholder="请输入封面图片URL（可选）">
                            </div>
                        </div>
                        {% if news.cover_image %}
                        <div class="mb-4">
                            <p class="text-sm text-muted mb-2">当前封面图片:</p>
                            <img src="{{ news.cover_image }}" alt="{{ news.title }}" style="max-width: 100%; max-height: 200px; object-fit: contain;">
                        </div>
                        {% endif %}
                        <div class="mb-4">
                            <label for="content" class="form-label">资讯内容 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-file-text-o"></i></span>
                                <textarea class="form-control" id="content" name="content" rows="8" required placeholder="请输入资讯内容">{{ news.content }}</textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('refuse_news.list_news') }}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left mr-2"></i>返回
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-save mr-2"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
