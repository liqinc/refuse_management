{% extends "base.html" %}

{% block title %}修改密码 - 垃圾分类管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="fa fa-lock mr-2"></i>修改密码</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('user_profile.change_password') }}">
                        <div class="mb-4">
                            <label for="current_password" class="form-label">当前密码 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-key"></i></span>
                                <input type="password" class="form-control" id="current_password" name="current_password" required placeholder="请输入当前密码">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="new_password" class="form-label">新密码 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" class="form-control" id="new_password" name="new_password" required placeholder="请输入新密码">
                            </div>
                            <small class="text-muted mt-1 d-block">密码至少包含8个字符，建议使用字母、数字和特殊字符的组合。</small>
                        </div>
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label">确认新密码 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-lock"></i></span>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="请再次输入新密码">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left mr-2"></i>返回
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-save mr-2"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
