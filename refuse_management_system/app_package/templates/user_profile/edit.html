{% extends "base.html" %}

{% block title %}编辑个人资料 - 垃圾分类管理系统{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="fa fa-user-edit mr-2"></i>编辑个人资料</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('user_profile.edit_profile') }}">
                        <div class="mb-4">
                            <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-user"></i></span>
                                <input type="text" class="form-control" id="username" name="username" value="{{ current_user.username }}" required placeholder="请输入用户名">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="form-label">邮箱 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-envelope"></i></span>
                                <input type="email" class="form-control" id="email" name="email" value="{{ current_user.email }}" required placeholder="请输入邮箱">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="full_name" class="form-label">姓名</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-id-card"></i></span>
                                <input type="text" class="form-control" id="full_name" name="full_name" value="{{ current_user.full_name or '' }}" placeholder="请输入真实姓名">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="phone" class="form-label">手机号码</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-phone"></i></span>
                                <input type="tel" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}" placeholder="请输入手机号码">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="bio" class="form-label">个人简介</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-file-text-o"></i></span>
                                <textarea class="form-control" id="bio" name="bio" rows="3" placeholder="请输入个人简介">{{ current_user.bio or '' }}</textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary">
                                <i class="fa fa-arrow-left mr-2"></i>返回
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fa fa-save mr-2"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
